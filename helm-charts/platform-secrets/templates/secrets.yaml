{{- range $name, $data := .Values.secretsData }}
{{- $existingSecret := lookup "v1" "Secret" $.Release.Namespace $name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
data:
{{- range $key, $value := $data }}
{{- if $existingSecret }}
  {{- if hasKey $existingSecret.data $key }}
  {{ $key }}: {{ index $existingSecret.data $key | quote }}
  {{- else if eq $value "GENERATE" }}
  {{ $key }}: {{ randAlphaNum 16 | b64enc | quote }}
  {{- else if eq $value "GENERATE_HEX" }}
  {{ $key }}: {{ randAlphaNum 32 | lower | b64enc | quote }}
  {{- else }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- else }}
  {{- if eq $value "GENERATE" }}
  {{ $key }}: {{ randAlphaNum 16 | b64enc | quote }}
  {{- else if eq $value "GENERATE_HEX" }}
  {{ $key }}: {{ randAlphaNum 32 | lower | b64enc | quote }}
  {{- else }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
---
{{- end }}