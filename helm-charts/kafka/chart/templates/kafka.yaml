---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: controllers
  labels:
    strimzi.io/cluster: {{ include "kafka.clusterName" . }}
    app.kubernetes.io/component: controller
    {{- include "kafka.labels" $ | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  roles:
    - controller
  storage:
    type: persistent-claim
    size: {{ .Values.controller.storage.size }}
    deleteClaim: false
  {{- if .Values.controller.resources }}
  resources:
    {{- toYaml .Values.controller.resources | nindent 4 }}
  {{- end }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: brokers
  labels:
    strimzi.io/cluster: {{ include "kafka.clusterName" . }}
    app.kubernetes.io/component: broker
    {{- include "kafka.labels" $ | nindent 4 }}
spec:
  replicas: {{ .Values.broker.replicas }}
  roles:
    - broker
  storage:
    type: persistent-claim
    size: {{ .Values.broker.storage.size }}
    deleteClaim: false
  {{- if .Values.broker.resources }}
  resources:
    {{- toYaml .Values.broker.resources | nindent 4 }}
  {{- end }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: {{ include "kafka.clusterName" . }}
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
  labels:
    strimzi.io/cluster: {{ include "kafka.clusterName" . }}
    app.kubernetes.io/component: kafka
    {{- include "kafka.labels" $ | nindent 4 }}
spec:
  kafka:
    {{- if and (.Values.customServiceMesh.enable | default false) (eq (.Values.customServiceMesh.type | default "") "linkerd") }}
    template:
      pod:
        metadata:
          annotations:
            config.linkerd.io/skip-outbound-ports: "8443,9090,9091"
            config.linkerd.io/skip-inbound-ports: "8443,9090,9091"
            config.linkerd.io/opaque-ports: "9092"
      bootstrapService:
        metadata:
          annotations:
            config.linkerd.io/opaque-ports: "9092"
      brokersService:
        metadata:
          annotations:
            config.linkerd.io/opaque-ports: "9092"
    {{- end }}
    version: {{ .Values.kafkaVersion }}
    metadataVersion: {{ .Values.kafka.metadataVersion | default "4.1-IV1" }}
    listeners:
      {{- toYaml .Values.kafka.listeners | nindent 6 }}
    {{- if .Values.kafka.config }}
    config:
      {{- toYaml .Values.kafka.config | nindent 6 }}
    {{- end }}
    {{- if .Values.kafka.authorization.enabled }}
    authorization:
      type: {{ .Values.kafka.authorization.type }}
      {{- if .Values.kafka.authorization.superUsers }}
      superUsers:
        {{- toYaml .Values.kafka.authorization.superUsers | nindent 8 }}
      {{- end }}
    {{- end }}
  entityOperator:
    topicOperator: {}
    userOperator: {}
    {{- if and (.Values.customServiceMesh.enable | default false) (eq (.Values.customServiceMesh.type | default "") "linkerd") }}
    template:
      pod:
        metadata:
          annotations:
            config.linkerd.io/skip-outbound-ports: "9091"
    {{- end }}
