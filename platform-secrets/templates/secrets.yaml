{{- range $name, $data := .Values.secretsData }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
data:
{{- range $key, $value := $data }}
{{- if eq $value "RANDOM" }}
  {{ $key }}: {{ randAlphaNum 16 | b64enc | quote }}
{{- else if eq $value "RANDOM_HEX" }}
  {{ $key }}: {{ randAlphaNum 32 | lower | b64enc | quote }}
{{- else }}
  {{ $key }}: {{ $value | b64enc | quote }}
{{- end }}
{{- end }}
---
{{- end }}