apiVersion: v1
kind: Pod
metadata:
  name: {{ include "postgresql.fullname" . }}-test-connection
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
  containers:
    - name: test-connection
      image: postgres:{{ .Values.image.tag }}
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.auth.existingSecret }}{{ .Values.auth.existingSecret }}{{ else }}{{ include "postgresql.fullname" . }}-auth{{ end }}
              key: password
      command:
        - sh
        - -c
        - |
          pg_isready -h {{ include "postgresql.fullname" . }} -U {{ .Values.auth.username | quote }} -d {{ .Values.auth.database | quote }} && echo "PostgreSQL: OK"
