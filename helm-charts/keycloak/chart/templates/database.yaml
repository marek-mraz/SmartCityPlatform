{{- if .Values.database.builtIn.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-db
  labels:
    app.kubernetes.io/name: keycloak-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: {{ .Values.database.username | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.database.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretKey | default "password" }}
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: keycloak-db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: keycloak-db-data
          {{- if .Values.database.builtIn.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "keycloak.fullname" . }}-db-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
---
{{- if .Values.database.builtIn.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "keycloak.fullname" . }}-db-pvc
  labels:
    app.kubernetes.io/name: keycloak-db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.database.builtIn.persistence.size | default "8Gi" }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-db
  labels:
    app.kubernetes.io/name: keycloak-db
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: keycloak-db
{{- end }}