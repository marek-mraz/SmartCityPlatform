---
# Values for Strimzi-based Kafka cluster

# Kafka cluster identity
clusterName: kafka-cluster
kafkaVersion: 4.1.0

controller:
  replicas: 1
  storage:
    size: 10Gi  # Persistent volume size for controller nodes
  resources:
    requests:
      cpu: '500m'
      memory: '1Gi'
    limits:
      cpu: '1'
      memory: '2Gi'

broker:
  replicas: 1
  storage:
    size: 5Gi   # Persistent volume size for broker nodes
  resources:
    requests:
      cpu: '500m'
      memory: '2Gi'
    limits:
      cpu: '2'
      memory: '8Gi'

kafka:
  # Kafka metadata version — must match a supported version for the given kafkaVersion
  metadataVersion: 4.1-IV1
  # Listener presets; adjust as needed
  listeners:
    - name: internal
      port: 9092
      type: internal
      tls: true
    - name: external
      port: 9094
      type: nodeport
      tls: true
      configuration:
        bootstrap:
          nodePort: null
        brokers: []
  config: # we gradually add more default configs here
    num.network.threads: 3
    num.io.threads: 8
    num.replica.fetchers: 2
    log.retention.ms: 2592000000 # 30d default
    queued.max.requests: 500
    auto.create.topics.enable: 'false'  # Disabled: prevents unauthorized topic creation
    # TODO: make these defaults overridable via values.yaml or set via replica count
    offsets.topic.replication.factor: 1
    transaction.state.log.replication.factor: 1
    transaction.state.log.min.isr: 1
    default.replication.factor: 1
    min.insync.replicas: 1
  # Cluster-level authorization — deny-by-default; access granted via KafkaUser ACLs
  authorization:
    enabled: true
    type: simple  # simple = ACL-based; also supports opa, keycloak, custom
    # superUsers:
    #   - User:admin

# Optional topics to create
# topics:
#   - name: example
#     partitions: 12
#     replicas: 3
#     config:
#       retention.ms: 604800000
#       cleanup.policy: delete

topics: []

# Optional users to create
# users:
#   - name: my-app
#     authentication:
#       type: tls
#     authorization:
#       type: simple
#       acls:
#         - resource:
#             type: topic
#             name: my-topic
#             patternType: literal
#           operation: Read
#         - resource:
#             type: group
#             name: my-group
#             patternType: literal
#           operation: Read
users: []

# ServiceAccount configuration (referenced by _helpers.tpl)
serviceAccount:
  create: false
  name: ""

# Custom Service Mesh configuration
customServiceMesh:
  enable: false
  type: ''

networkPolicy:
  # Enable NetworkPolicy to restrict Kafka access to permitted pods only
  enabled: true
  # Namespace where the Strimzi operator runs — required for operator management access
  strimziOperatorNamespace: strimzi-system
  # Additional ingress rules appended to the client-access NetworkPolicy
  additionalIngress: []
  #   - from:
  #       - podSelector:
  #           matchLabels:
  #             app.kubernetes.io/name: my-app
  #     ports:
  #       - port: 9092
  #         protocol: TCP
