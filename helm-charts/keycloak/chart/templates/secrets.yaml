{{- range $nameSuffix, $values := .Values.secrets }}
---
{{- if $values.sealed }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "keycloak.fullname" $ }}-{{ $nameSuffix }}
  namespace: {{ $.Release.Namespace }}
  {{- with $values.annotations }}
  annotations:
  {{- range $key, $value := . }}
  {{- printf "%s: %s" $key (tpl $value $ | quote) | nindent 4 }}
  {{- end }}
  {{- end }}
  labels:
  {{- include "keycloak.labels" $ | nindent 4 }}
  {{- range $key, $value := $values.labels }}
  {{- printf "%s: %s" $key (tpl $value $ | quote) | nindent 4 }}
  {{- end }}
spec:
  encryptedData:
    {{- toYaml $values.encryptedData | nindent 4 }}
  template:
    metadata:
      name: {{ include "keycloak.fullname" $ }}-{{ $nameSuffix }}
      labels:
      {{- include "keycloak.labels" $ | nindent 8 }}
      {{- range $key, $value := $values.labels }}
      {{- printf "%s: %s" $key (tpl $value $ | quote) | nindent 8 }}
      {{- end }}
    type: {{ default "Opaque" $values.type }}
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.fullname" $ }}-{{ $nameSuffix }}
  namespace: {{ $.Release.Namespace }}
  {{- with $values.annotations }}
  annotations:
  {{- range $key, $value := . }}
  {{- printf "%s: %s" $key (tpl $value $ | quote) | nindent 4 }}
  {{- end }}
  {{- end }}
  labels:
  {{- include "keycloak.labels" $ | nindent 4 }}
  {{- range $key, $value := $values.labels }}
  {{- printf "%s: %s" $key (tpl $value $ | quote) | nindent 4 }}
  {{- end }}
type: {{ default "Opaque" $values.type }}
{{- with $values.data }}
data:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- with $values.stringData }}
stringData:
  {{- range $key, $value := . }}
  {{- printf "%s: %s" $key (tpl $value $ | quote) | nindent 2 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end -}}
