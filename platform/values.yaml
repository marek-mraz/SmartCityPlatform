global:
  repoURL: &repoURL https://github.com/marek-mraz/SmartCityPlatform
  targetRevision: &targetRevision main
  destinationNamespace: &destinationNamespace fiware
  release: &release fiware
  argoNamespace: &argoNamespace argocd
  secretsEnabled: &secretsEnabled true
  keycloakEnabled: &keycloakEnabled true
  host: &host example.com
  ingressClassName: &ingressClassName traefik
  mqttPort: &mqttPort 1883
  tsdbUser: &tsdbUser postgres

applications:

  keycloak-db:
    enabled: true
    syncWave: "1"
    path: helm-charts/keycloak/chart/postgresql/chart
    valueFiles:
      - values.yaml
    values:
      auth:
        database: keycloak
        username: keycloak
      sealedSecret:
        enabled: true
        # encryptedPassword injected from platform/secrets.yaml via seal.sh
      persistence:
        enabled: true
        size: 8Gi

  keycloak:
    enabled: true
    syncWave: "2"
    path: helm-charts/keycloak/chart
    valueFiles:
      - values.yaml
    values:
      database:
        vendor: postgres
        hostname: keycloak-db
        port: 5432
        username: keycloak
        database: keycloak
        existingSecret: keycloak-db-auth
        existingSecretKey: password
      http:
        relativePath: "/"
      command:
        - "/opt/keycloak/bin/kc.sh"
        - "start"
        - "--http-port=8080"
        - "--hostname-strict=false"
        - "--proxy-headers=xforwarded"
      extraEnv: |
        - name: KEYCLOAK_ADMIN
          valueFrom:
            secretKeyRef:
              name: keycloak-admin-creds
              key: user
        - name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-admin-creds
              key: password
        - name: KC_DB
          value: postgres
        - name: KC_DB_URL
          value: jdbc:postgresql://keycloak-db:5432/keycloak
        - name: KC_DB_USERNAME
          value: "keycloak"
        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-db-auth
              key: password
        - name: KC_HOSTNAME
          value: "https://auth.{{ $.Values.global.host | default `localhost` }}"
      extraManifests: []
      serviceMonitor:
        enabled: false
      ingress:
        enabled: true
        ingressClassName: *ingressClassName
        annotations:
          traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
          traefik.ingress.kubernetes.io/router.tls: "true"
        rules:
          - host: "auth.{{ $.Values.global.host | default `localhost` }}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - "auth.{{ $.Values.global.host | default `localhost` }}"

  postgres:
    enabled: false
    syncWave: "1"
    path: helm-charts/postgres/chart
    valueFiles:
      - values.yaml
    values:
      fullnameOverride: postgres
      image:
        repository: postgis/postgis
        tag: "14-3.3"
      auth:
        database: ngb
        username: ngb
      sealedSecret:
        enabled: true

  kafka:
    enabled: false
    syncWave: "2"
    path: helm-charts/kafka/chart
    valueFiles:
      - values.yaml
    values:
      fullnameOverride: kafka
      networkPolicy:
        additionalIngress:
          - from:
              - podSelector:
                  matchLabels:
                    app.kubernetes.io/name: scorpio
            ports:
              - port: 9092
                protocol: TCP

  scorpio:
    enabled: false
    syncWave: "5"
    path: helm-charts/scorpio/chart
    valueFiles:
      - values.yaml
    values:
      postgresql:
        enabled: false
        host: postgres
        port: 5432
        user: ngb
        database: ngb
        existingSecret: postgres-auth
        existingSecretPasswordKey: password
      kafka:
        enabled: false
        bootstrapServers: "kafka-cluster-kafka-bootstrap:9092"
      fullnameOverride: scorpio
      nameOverride: scorpio
      ingress:
        enabled: true
        className: *ingressClassName
        annotations:
          traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
          traefik.ingress.kubernetes.io/router.tls: "true"
        hosts:
          - host: scorpio.{{ $.Values.global.host | default `localhost` }}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - scorpio.{{ $.Values.global.host | default `localhost` }}

  timescale:
    enabled: false
    releaseName: tsdb
    syncWave: "1"
    path: helm-charts/timescale/chart
    valueFiles:
      - values.yaml
    values:
      fullnameOverride: tsdb
      nameOverride: tsdb
      postgresql:
        user: *tsdbUser
        database: postgres
        existingSecret: tsdb-credentials
        existingSecretPasswordKey: password
      persistence:
        enabled: true
        size: 8Gi

  grafana:
    enabled: false
    secretsReady: true
    path: helm-charts/grafana/chart
    valueFiles:
      - values.yaml
    values:
      route:
        enabled: false
      tests:
        enabled: false
      grafana:
        persistence:
          enabled: true
          size: 2Gi
          annotations:
            argocd.argoproj.io/sync-options: Prune=false
            helm.sh/resource-policy: keep
        serviceMonitor:
          enabled: false
        extraSecretMounts: []
        admin:
          existingSecret: grafana-admin-user
          userKey: admin-user
          passwordKey: admin-password
        image:
          tag: "12.4"
        grafana.ini:
          server:
            root_url: https://grafana.{{ $.Values.global.host | default `localhost` }}
          auth.generic_oauth:
            enabled: true
            name: Keycloak
            allow_sign_up: true
            client_id: grafana
            client_secret: ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
            scopes: openid email profile
            auth_url: "https://auth.{{ $.Values.global.host | default `localhost` }}/realms/fiware-server/protocol/openid-connect/auth"
            token_url: "https://auth.{{ $.Values.global.host | default `localhost` }}/realms/fiware-server/protocol/openid-connect/token"
            api_url: "https://auth.{{ $.Values.global.host | default `localhost` }}/realms/fiware-server/protocol/openid-connect/userinfo"
            role_attribute_path: "contains(resource_access.grafana.roles[*], 'Admin') && 'Admin' || contains(resource_access.grafana.roles[*], 'Editor') && 'Editor' || 'Viewer'"
        env:
          GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "ngsild-grafana-datasource"
        envValueFrom:
          GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
            secretKeyRef:
              name: grafana-oauth
              key: client-secret
          NGSILD_CLIENT_SECRET:
            secretKeyRef:
              name: ngsild-oauth
              key: client-secret
          TSDB_PASSWORD:
            secretKeyRef:
              name: tsdb-credentials
              key: password
        plugins:
          - "https://github.com/Mrazbb/ngsild-grafana-datasource/releases/download/v7.0.6/ngsild-grafana-datasource.zip;ngsild-grafana-datasource"
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: NGSI-LD
                type: ngsild-grafana-datasource
                uid: ngsild
                access: proxy
                url: '{{ if $.Values.global.keycloakEnabled }}http://apisix:80{{ else }}http://scorpio:9090{{ end }}'
                jsonData:
                  tenant: "airquality"
                  contextUrl: "https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context.jsonld"
                  tlsAuth: false
                  tlsAuthWithCACert: false
                  tlsSkipVerify: false
                  httpMode: GET
                  authType: oauth
                  tokenUrl: "https://auth.{{ $.Values.global.host | default `localhost` }}/realms/fiware-server/protocol/openid-connect/token"
                  flavour: generic
                  httpHeaderName1: "NGSILD-Path"
                  clientId: "grafana-ngsild"
                  clientSecret: "ngsild-secret"
                secureJsonData:
                  clientId: "grafana-ngsild"
                  clientSecret: "${NGSILD_CLIENT_SECRET}"
                  httpHeaderValue1: "/#"
              - name: TimescaleDB
                type: postgres
                uid: timescaledb
                url: tsdb:5432
                database: postgres
                user: *tsdbUser
                secureJsonData:
                  password: "${TSDB_PASSWORD}"
                jsonData:
                  sslmode: "disable"
                  postgresVersion: 1400
                  timescaledb: true
        ingress:
          enabled: true
          ingressClassName: *ingressClassName
          annotations:
            traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
            traefik.ingress.kubernetes.io/router.tls: "true"
          hosts:
            - grafana.{{ $.Values.global.host | default `localhost` }}
          tls:
            - hosts:
                - grafana.{{ $.Values.global.host | default `localhost` }}

  advanced-dashboards:
    enabled: false
    path: helm-charts/advanced-dashboards/chart
    valueFiles:
      - values.yaml

  mongodb:
    enabled: false
    syncWave: "1"
    path: helm-charts/mongodb/chart
    valueFiles:
      - values.yaml
    values:
      mongodb:
        auth:
          rootPassword: "test"
        persistence:
          enabled: true
          size: 8Gi
          annotations:
            argocd.argoproj.io/sync-options: Prune=false
            helm.sh/resource-policy: keep

  grafana-metrics:
    enabled: false
    secretsReady: true
    path: helm-charts/grafana-metrics/chart
    valueFiles:
      - values.yaml
    values:
      route:
        enabled: false
      grafana:
        grafana.ini:
          server:
            root_url: https://grafana-metrics.{{ $.Values.global.host | default `localhost` }}
          auth.generic_oauth:
            enabled: true
            name: Keycloak
            allow_sign_up: true
            client_id: grafana
            client_secret: ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
            scopes: openid email profile
            auth_url: "https://auth.{{ $.Values.global.host | default `localhost` }}/realms/fiware-server/protocol/openid-connect/auth"
            token_url: "https://auth.{{ $.Values.global.host | default `localhost` }}/realms/fiware-server/protocol/openid-connect/token"
            api_url: "https://auth.{{ $.Values.global.host | default `localhost` }}/realms/fiware-server/protocol/openid-connect/userinfo"
            role_attribute_path: contains(resource_access.grafana.roles[*], 'Admin') && 'Admin' || contains(resource_access.grafana.roles[*], 'Editor') && 'Editor' || 'Viewer'
        envValueFrom:
          GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
            secretKeyRef:
              name: grafana-oauth
              key: client-secret
        serviceMonitor:
          enabled: false
        ingress:
          enabled: true
          ingressClassName: *ingressClassName
          annotations:
            traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
            traefik.ingress.kubernetes.io/router.tls: "true"
          hosts:
            - grafana-metrics.{{ $.Values.global.host | default `localhost` }}
          tls:
            - hosts:
                - grafana-metrics.{{ $.Values.global.host | default `localhost` }}

  emqx:
    enabled: false
    path: helm-charts/emqx/chart
    valueFiles:
      - values.yaml
    values:
      fullnameOverride: emqx
      persistence:
        enabled: true
        size: 1Gi
      service:
        type: LoadBalancer
        mqtt: *mqttPort
        annotations:
          load-balancer.hetzner.cloud/network-zone: "eu-central"
      envFromSecret: emqx-dashboard-credentials
      emqxConfig:
        EMQX_ALLOW_ANONYMOUS: "false"
        EMQX_AUTHORIZATION__NO_MATCH: "deny"

  emqx-oauth2-proxy:
    enabled: false
    repoURL: https://oauth2-proxy.github.io/manifests
    targetRevision: "6.2.2"
    chart: oauth2-proxy
    values:
      config:
        clientID: "emqx-dashboard"
        existingSecret: "emqx-dashboard-oauth2"
      extraArgs:
        provider: "oidc"
        oidc-issuer-url: "https://auth.{{ $.Values.global.host | default `localhost` }}/realms/fiware-server"
        upstream: "http://emqx:18083"
        email-domain: "*"
        pass-access-token: "true"
      ingress:
        enabled: true
        className: *ingressClassName
        ingressClassName: *ingressClassName
        annotations:
          traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
          traefik.ingress.kubernetes.io/router.tls: "true"
        hosts:
          - "emqx.{{ $.Values.global.host | default `localhost` }}"
        tls:
          - hosts:
              - "emqx.{{ $.Values.global.host | default `localhost` }}"

  node-red:
    enabled: false
    path: helm-charts/node-red/chart
    valueFiles:
      - values.yaml
    values:
      persistence:
        enabled: true
        size: 5Gi
      oauth2Proxy:
        enabled: true
        clientId: node-red
        existingSecret: node-red-oauth2
        oidcIssuerUrl: "https://auth.{{ $.Values.global.host | default `localhost` }}/realms/fiware-server"
      ingress:
        enabled: true
        className: *ingressClassName
        annotations:
          traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
          traefik.ingress.kubernetes.io/router.tls: "true"
        hosts:
          - host: "node-red.{{ $.Values.global.host | default `localhost` }}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - "node-red.{{ $.Values.global.host | default `localhost` }}"

  iot-agent-json:
    enabled: false
    syncWave: "5"
    path: helm-charts/iot-agent-json/chart
    valueFiles:
      - values.yaml
    values:
      config:
        iotaCbHost: scorpio
        iotaCbPort: 9090
        iotaMqttHost: emqx
        iotaMqttPort: *mqttPort
        iotaMqttUsername: "iot_agent"
        iotaMqttPassword: "iot_password"
        iotaMongoHost: mongodb-iotagent
        iotaCbNgsiVersion: "ld"
        iotaJsonLdContext: "https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context.jsonld"
        iotaFallbackTenant: "airquality"
        mongoAuth:
          enabled: true
          user: root
          secretName: mongodb-iotagent
          secretKey: mongodb-root-password

  orion-sync-unwrapper:
    enabled: false
    path: helm-charts/orion-sync-unwrapper/chart
    valueFiles:
      - values.yaml
    values:
      ingress:
        enabled: true
        className: *ingressClassName
        annotations:
          traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
          traefik.ingress.kubernetes.io/router.tls: "true"
        hosts:
          - host: unwrapper.{{ $.Values.global.host | default `localhost` }}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - unwrapper.{{ $.Values.global.host | default `localhost` }}

  apisix:
    enabled: false
    path: helm-charts/apisix/chart
    valueFiles:
      - values.yaml
    values:
      config:
        keycloakDiscoveryUrl: "https://auth.{{ $.Values.global.host | default `localhost` }}/realms/fiware-server/.well-known/openid-configuration"
        existingSecret: cb-pep-credentials
        existingSecretKey: client-secret
      ingress:
        enabled: true
        className: *ingressClassName
        annotations:
          traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
          traefik.ingress.kubernetes.io/router.tls: "true"
        hosts:
          - host: cb.{{ $.Values.global.host | default `localhost` }}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - cb.{{ $.Values.global.host | default `localhost` }}

  nexurbis-manager:
    enabled: false
    syncWave: "5"
    path: helm-charts/nexurbis-manager/chart
    valueFiles:
      - values.yaml
    values:
      ingress:
        enabled: true
        className: *ingressClassName
        annotations:
          traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
          traefik.ingress.kubernetes.io/router.tls: "true"
        hosts:
          - host: "manager.{{ $.Values.global.host | default `localhost` }}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - "manager.{{ $.Values.global.host | default `localhost` }}"
      env:
        VITE_KEYCLOAK_URL: "https://auth.{{ $.Values.global.host | default `localhost` }}"
        VITE_API_BASE_URL: "https://manager.{{ $.Values.global.host | default `localhost` }}"
        APP_URL: "https://manager.{{ $.Values.global.host | default `localhost` }}"
        API_BASE_URL: "https://manager.{{ $.Values.global.host | default `localhost` }}"
        KEYCLOAK_URL: "https://auth.{{ $.Values.global.host | default `localhost` }}"
        KEYCLOAK_ISSUER_URL: "https://auth.{{ $.Values.global.host | default `localhost` }}/realms/fiware-server"
        KEYCLOAK_REALM: "fiware-server"
        KEYCLOAK_CLIENT_ID: "nexurbis-manager"
        MQTT_HOST: "emqx"
        MQTT_PORT: "1883"
        EMQX_API_URL: "http://emqx:18083"
      database:
        host: nexurbis-manager-db
        port: 5432
        username: postgres
        name: nexurbis
        existingSecret: nexurbis-db-credentials
        existingSecretPasswordKey: password
        builtIn:
          enabled: true
          persistence:
            enabled: true
            size: 8Gi
      extraManifests: []
      keycloak:
        existingSecret: nexurbis-manager-oauth2
        existingSecretKey: client-secret
        adminExistingSecret: keycloak-admin-credentials
        adminExistingSecretKey: password
        dbExistingSecret: keycloak-db-credentials
        dbExistingSecretKey: password

  gitlab:
    enabled: false
    repoURL: https://charts.gitlab.io/
    targetRevision: "8.6.0"
    chart: gitlab
    values:
      global:
        hosts:
          domain: "{{ $.Values.global.host | default `localhost` }}"
        edition: ce
      certmanager-issuer:
        email: admin@{{ $.Values.global.host | default `localhost` }}
