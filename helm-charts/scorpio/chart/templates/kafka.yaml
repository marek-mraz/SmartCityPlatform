{{- if .Values.kafka.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scorpioBroker-aaio.fullname" . }}-kafka
  labels:
    {{- include "scorpioBroker-aaio.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "scorpioBroker-aaio.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: kafka
  template:
    metadata:
      labels:
        {{- include "scorpioBroker-aaio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: kafka
      annotations:
        checksum/values: {{ .Values | toYaml | sha256sum }}
    spec:
      containers:
      - name: kafka
        image: wurstmeister/kafka:2.13-2.8.1
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 9092
        env:
          - name: KAFKA_ADVERTISED_HOST_NAME
            value: {{ include "scorpioBroker-aaio.fullname" . }}-kafka
          - name: KAFKA_ADVERTISED_PORT
            value: "9092"
          - name: KAFKA_ZOOKEEPER_CONNECT
            value: {{ include "scorpioBroker-aaio.fullname" . }}-zookeeper:2181
          - name: KAFKA_LOG_DIRS
            value: /kafka/kafka-logs
        volumeMounts:
          - name: kafka-data
            mountPath: /kafka
      volumes:
        - name: kafka-data
          {{- if .Values.kafka.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "scorpioBroker-aaio.fullname" . }}-kafka-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
---
{{- if .Values.kafka.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "scorpioBroker-aaio.fullname" . }}-kafka-pvc
  labels:
    {{- include "scorpioBroker-aaio.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.kafka.persistence.size | default "8Gi" }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "scorpioBroker-aaio.fullname" . }}-kafka
  labels:
    {{- include "scorpioBroker-aaio.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
spec:
  ports:
  - name: "9092"
    port: 9092
    targetPort: 9092
  selector:
    {{- include "scorpioBroker-aaio.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
{{- end }}