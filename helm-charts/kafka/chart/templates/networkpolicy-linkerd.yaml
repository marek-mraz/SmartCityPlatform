{{- if and (.Values.customServiceMesh.enable | default false) (eq (.Values.customServiceMesh.type | default "") "linkerd") }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-allow-linkerd
spec:
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 4143
          protocol: TCP
        - port: 4190
          protocol: TCP
        - port: 4191
          protocol: TCP
  podSelector:
    matchLabels:
      strimzi.io/cluster: kafka-cluster
      strimzi.io/kind: Kafka
      strimzi.io/name: kafka-cluster-kafka
{{- end }}
