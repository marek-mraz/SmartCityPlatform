{{- if and (.Values.customServiceMesh.enable | default false) (eq (.Values.customServiceMesh.type | default "") "linkerd") }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ printf "%s-allow-linkerd" (include "kafka.clusterName" .) }}
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
spec:
  policyTypes:
    - Ingress
  ingress:
    # Linkerd proxy sidecar ports — restricted to same namespace only
    - from:
        - podSelector: {}
      ports:
        - port: 4143
          protocol: TCP
        - port: 4190
          protocol: TCP
        - port: 4191
          protocol: TCP
  podSelector:
    matchLabels:
      strimzi.io/cluster: {{ include "kafka.clusterName" . }}
      strimzi.io/kind: Kafka
      strimzi.io/name: {{ printf "%s-kafka" (include "kafka.clusterName" .) }}
{{- end }}
