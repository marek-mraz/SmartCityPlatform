{{- if not .Values.auth.existingSecret }}
{{- if .Values.sealedSecret.enabled }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "postgresql.fullname" . }}-auth
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
spec:
  encryptedData:
    password: {{ required "sealedSecret.encryptedPassword must be set when sealedSecret.enabled is true — generate with kubeseal" .Values.sealedSecret.encryptedPassword | quote }}
  template:
    metadata:
      name: {{ include "postgresql.fullname" . }}-auth
      labels:
        {{- include "postgresql.labels" . | nindent 8 }}
    type: Opaque
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgresql.fullname" . }}-auth
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ required "auth.password is required when sealedSecret.enabled is false and auth.existingSecret is not set — provide via --set or a git-ignored override file" .Values.auth.password | quote }}
{{- end }}
{{- end }}
